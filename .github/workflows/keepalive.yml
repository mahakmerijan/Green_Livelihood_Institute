name: Keep Render Alive

on:
  schedule:
    # Runs every 5 minutes (GitHub Actions minimum interval)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render deployment
        run: |
          echo "Pinging https://green-livelihood-institute-web.onrender.com/healthz ..."
          curl -sf --max-time 30 https://green-livelihood-institute-web.onrender.com/healthz \
            && echo "OK - server is alive" \
            || echo "WARNING - ping failed or server is waking up"
