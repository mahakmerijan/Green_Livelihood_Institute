name: Keep Render Alive

on:
  schedule:
    # Runs every 5 minutes (GitHub Actions minimum interval)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI
  push:
    branches: [main]  # Also re-enables the schedule after any push

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping Render deployment
        run: |
          echo "Pinging https://green-livelihood-institute-web.onrender.com/healthz ..."
          STATUS=$(curl -o /dev/null -sw "%{http_code}" --max-time 30 \
            https://green-livelihood-institute-web.onrender.com/healthz)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "OK - server is alive"
          else
            echo "WARNING - received HTTP $STATUS (server may be waking up)"
          fi
